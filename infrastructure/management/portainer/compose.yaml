services:
  portainer:
    image: portainer/portainer-ce:2.39.4
    container_name: portainer

    restart: unless-stopped

    ports:
      - "9443:9443"

    volumes:
      - portainer_data:/data
      - /var/run/docker.sock:/var/run/docker.sock

    networks:
      - homelab-network

volumes:
  portainer_data:

networks:
  homelab-network:
    external: true