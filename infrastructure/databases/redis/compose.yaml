name: redis

services:
  redis:
    image: ${REDIS_IMAGE}
    container_name: redis
    restart: unless-stopped

    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

    ports:
      - "${REDIS_PORT}:6379"

    volumes:
      - redis_data:/data

    networks:
      - homelab-network

    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping | grep PONG || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  redis_data:

networks:
  homelab-network:
    external: true
