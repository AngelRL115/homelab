name: minio

services:
  minio:
    image: ${MINIO_IMAGE}
    container_name: minio
    restart: unless-stopped

    command: server /data --console-address ":9001"

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      TZ: ${TZ}

    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"

    volumes:
      - minio_data:/data

    networks:
      - homelab-network

    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  minio_data:

networks:
  homelab-network:
    external: true
